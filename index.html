<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shoe AR Test</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>

    body{
      margin:0;
      background:#111;
      overflow:hidden;
    }

    model-viewer{
      width:100vw;
      height:100vh;
      background:#222;
    }

  </style>

</head>

<body>

<model-viewer
 src="shoe.glb"
 ar
 ar-modes="webxr scene-viewer quick-look"
 camera-controls
 auto-rotate
 shadow-intensity="1"
 exposure="1"
 camera-orbit="0deg 75deg 105%"
 alt="3D Shoe">

  </model-viewer>

</body>

</html>
