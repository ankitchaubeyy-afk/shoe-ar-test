<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shoe Try-On - Real GLB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100dvh;color:#e8d5b0}
#container{position:relative;width:100vw;height:100dvh;overflow:hidden}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#three{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
#debug{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
#loader,#start-screen{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
.hidden{display:none!important}
.title{font-size:20px;letter-spacing:4px;font-weight:800}
.bar-wrap{width:245px;height:3px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden}
.bar{height:100%;width:0;background:#e8d5b0;transition:.25s}
.msg{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#777;line-height:1.75;max-width:360px}
.btn-main{background:#e8d5b0;color:#000;border:0;border-radius:12px;padding:14px 28px;font-weight:800;cursor:pointer}
.retry{display:none}
.top{position:fixed;z-index:20;top:14px;padding:7px 13px;background:rgba(0,0,0,.62);border:1px solid rgba(232,213,176,.22);border-radius:20px;font-size:11px;letter-spacing:2px;text-decoration:none;color:#e8d5b0}
.back{left:12px}.feet{right:12px;color:#4fffb0}
#ui{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:10px 12px 28px;background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.45),transparent)}
#status{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;color:#ff6b6b}
#status.on{color:#4fffb0}
.row{display:flex;align-items:center;gap:8px;margin:5px 0;color:#777;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.row label{width:58px}.row input{flex:1;accent-color:#e8d5b0}.row span{width:42px;text-align:right;color:#e8d5b0;font-weight:700}
.btns{display:flex;gap:8px;margin-top:8px}.btn{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;border-radius:10px;padding:9px;font-size:11px;letter-spacing:1px}.btn.on{border-color:#e8d5b0;color:#e8d5b0;background:rgba(232,213,176,.12)}
#debugBox{position:fixed;left:12px;top:54px;z-index:30;max-width:92vw;font-size:10px;line-height:1.5;color:#bbb;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px;display:none;white-space:pre-wrap}
</style>
</head>
<body>
<div id="loader">
  <div class="title">SHOE TRY-ON</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="msg" id="msg">Starting...</div>
  <button class="btn-main retry" id="retry" onclick="location.reload()">↺ Retry</button>
</div>

<div id="start-screen" class="hidden">
  <div style="font-size:52px">👟</div>
  <div class="title">REAL GLB TRY-ON</div>
  <div class="msg">Real <b>shoe.glb</b> loaded. Point camera at your feet.</div>
  <button class="btn-main" id="start-btn">📷 Start Camera</button>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="three"></canvas>
  <canvas id="debug"></canvas>
</div>

<a href="index.html" class="top back">← AR</a>
<div class="top feet" id="badge">👟 0 feet</div>
<div id="debugBox"></div>

<div id="ui">
  <div id="status">Loading...</div>
  <div class="row"><label>Scale</label><input id="scale" type="range" min="0.05" max="6" step="0.01" value="1"><span id="scalev">1.00</span></div>
  <div class="row"><label>Y Pos</label><input id="ypos" type="range" min="-260" max="260" step="1" value="0"><span id="yposv">0</span></div>
  <div class="row"><label>X Rot</label><input id="xrot" type="range" min="-180" max="180" step="1" value="65"><span id="xrotv">65</span></div>
  <div class="row"><label>Z Rot</label><input id="zrot" type="range" min="-180" max="180" step="1" value="0"><span id="zrotv">0</span></div>
  <div class="btns">
    <button class="btn" id="skbtn">Skeleton</button>
    <button class="btn" id="mirbtn">Mirror</button>
    <button class="btn" id="flipbtn">Flip Shoe</button>
    <button class="btn" id="dbgbtn">Debug</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

const $ = id => document.getElementById(id);
const S = { detector:null, left:null, right:null, running:false, feet:[], scale:1, y:0, xrot:65, zrot:0, skeleton:false, mirror:false, flip:false, debug:false, modelPath:'' };

const video=$('video'), threeCanvas=$('three'), debug=$('debug'), dctx=debug.getContext('2d');
const bar=$('bar'), msg=$('msg'), loader=$('loader'), start=$('start-screen'), status=$('status'), badge=$('badge'), debugBox=$('debugBox');

function setProgress(p,t){ bar.style.width=p+'%'; if(t) msg.innerHTML=t; }
function setDebug(t){ debugBox.textContent=t; debugBox.style.display=S.debug?'block':'none'; }

['scale','ypos','xrot','zrot'].forEach(id => $(id).oninput = e => {
  const v = +e.target.value;
  if(id==='scale') S.scale=v;
  if(id==='ypos') S.y=v;
  if(id==='xrot') S.xrot=v;
  if(id==='zrot') S.zrot=v;
  $(id+'v').textContent = id==='scale' ? v.toFixed(2) : v;
});
$('skbtn').onclick=()=>{$('skbtn').classList.toggle('on');S.skeleton=!S.skeleton};
$('mirbtn').onclick=()=>{$('mirbtn').classList.toggle('on');S.mirror=!S.mirror};
$('flipbtn').onclick=()=>{$('flipbtn').classList.toggle('on');S.flip=!S.flip};
$('dbgbtn').onclick=()=>{$('dbgbtn').classList.toggle('on');S.debug=!S.debug;debugBox.style.display=S.debug?'block':'none'};

let renderer, scene, camera;

function initThree(){
  renderer = new THREE.WebGLRenderer({canvas:threeCanvas, alpha:true, antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.setClearColor(0x000000, 0);

  scene = new THREE.Scene();
  camera = new THREE.OrthographicCamera(-1,1,1,-1,-1000,1000);
  camera.position.z = 10;

  scene.add(new THREE.HemisphereLight(0xffffff,0x333333,2.4));
  const dir = new THREE.DirectionalLight(0xffffff,2.2);
  dir.position.set(2,4,6);
  scene.add(dir);
}

function resize(){
  const w = video.videoWidth || window.innerWidth;
  const h = video.videoHeight || window.innerHeight;
  renderer.setSize(w,h,false);
  debug.width=w; debug.height=h;
  camera.left=-w/2; camera.right=w/2; camera.top=h/2; camera.bottom=-h/2;
  camera.updateProjectionMatrix();
}

function getModelPath(){
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('model');
  const path = fromUrl && fromUrl.trim() ? fromUrl.trim() : 'shoe.glb';
  return new URL(path, location.href).href;
}

async function checkFile(url){
  const r = await fetch(url, {cache:'no-store'});
  if(!r.ok) throw new Error('Model file not found: HTTP '+r.status);
  const type = r.headers.get('content-type') || 'unknown';
  const len = r.headers.get('content-length') || 'unknown';
  return {type,len};
}

function loadGLB(url){
  return new Promise((resolve,reject)=>{
    const l = new GLTFLoader();
    l.load(url, gltf => resolve(gltf.scene), undefined, err => reject(err));
  });
}

function prepareModel(root){
  root.traverse(o=>{
    if(o.isMesh){
      o.frustumCulled=false;
      if(o.material){
        if(Array.isArray(o.material)) o.material.forEach(m=>{m.side=THREE.DoubleSide;m.needsUpdate=true;});
        else {o.material.side=THREE.DoubleSide;o.material.needsUpdate=true;}
      }
    }
  });

  const box = new THREE.Box3().setFromObject(root);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  root.position.sub(center);

  const biggest = Math.max(size.x, size.y, size.z) || 1;
  const normalize = 180 / biggest;
  root.scale.setScalar(normalize);
  return {size, biggest, normalize};
}

async function boot(){
  try{
    setProgress(10,'Checking <b>shoe.glb</b>...');
    S.modelPath = getModelPath();
    const info = await checkFile(S.modelPath);

    setProgress(25,'Loading Three.js viewer...');
    initThree();

    setProgress(40,'Loading your real GLB shoe...');
    const model = await loadGLB(S.modelPath);
    const modelInfo = prepareModel(model);

    S.left = model;
    S.right = model.clone(true);
    scene.add(S.left, S.right);
    S.left.visible = false; S.right.visible = false;

    setProgress(62,'Loading AI foot tracking...');
    await tf.ready();
    S.detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING, enableSmoothing:true }
    );

    setProgress(100,'Ready!<br>Model loaded: <b>shoe.glb</b>');
    setDebug(`MODEL OK
Path: ${S.modelPath}
Content-Type: ${info.type}
Size header: ${info.len}
Normalized scale: ${modelInfo.normalize.toFixed(4)}
GLB size: ${modelInfo.size.x.toFixed(2)}, ${modelInfo.size.y.toFixed(2)}, ${modelInfo.size.z.toFixed(2)}`);

    setTimeout(()=>{loader.classList.add('hidden');start.classList.remove('hidden')},350);
  }catch(e){
    console.error(e);
    const details = e?.message || String(e);
    setProgress(100,`GLB load failed.<br><br>Keep <b>shoe.glb</b> in the same GitHub folder as <b>tryon.html</b>.<br><br>Current path:<br><b>${S.modelPath || getModelPath()}</b><br><br>Error: ${details}`);
    $('retry').style.display='block';
    S.debug=true;
    setDebug(details);
  }
}

$('start-btn').onclick = async () => {
  start.classList.add('hidden');
  try{
    video.srcObject = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    await video.play();
  }catch(e){
    alert('Camera error: '+e.message);
    start.classList.remove('hidden');
    return;
  }
  resize();
  S.running=true;
  requestAnimationFrame(loop);
};

let last=0;
async function loop(t){
  if(!S.running) return;
  requestAnimationFrame(loop);
  if(video.videoWidth && threeCanvas.width !== video.videoWidth) resize();

  if(t-last > 70){
    last=t;
    try{
      const poses = await S.detector.estimatePoses(video,{flipHorizontal:false});
      processPoses(poses);
    }catch(e){ console.warn(e); }
  }
  draw();
  renderer.render(scene,camera);
}

function processPoses(poses){
  S.feet=[];
  (poses||[]).forEach(p=>{
    const k=p.keypoints;
    const get=i=>k[i] && k[i].score>.23 ? k[i] : null;
    [[15,13,'left'],[16,14,'right']].forEach(([ankleI,kneeI,side])=>{
      const ankle=get(ankleI), knee=get(kneeI);
      if(!ankle) return;
      let angle=0;
      if(knee) angle=Math.atan2(ankle.y-knee.y, ankle.x-knee.x);
      const footLen = 80 + (ankle.y/(debug.height||720))*140;
      S.feet.push({x:ankle.x,y:ankle.y,angle,side,footLen,kps:k});
    });
  });
  badge.textContent='👟 '+S.feet.length+' feet';
  status.textContent=S.feet.length?'Tracking ✓':'Show feet to camera';
  status.className=S.feet.length?'on':'';
}

function draw(){
  dctx.clearRect(0,0,debug.width,debug.height);
  if(S.left) S.left.visible=false;
  if(S.right) S.right.visible=false;

  S.feet.slice(0,2).forEach(f=>{
    const o = f.side==='left' ? S.left : S.right;
    if(!o) return;
    o.visible=true;

    const x = f.x - debug.width/2;
    const y = -(f.y + S.y - debug.height/2);
    o.position.set(x,y,0);

    const sc = (f.footLen/180) * S.scale;
    o.scale.setScalar(sc);

    let z = f.angle - Math.PI/2 + (S.zrot*Math.PI/180);
    if(S.flip) z += Math.PI;
    const yRot = (f.side==='right' || S.mirror) ? Math.PI : 0;
    o.rotation.set(S.xrot*Math.PI/180, yRot, z);
  });

  if(S.skeleton && S.feet[0]){
    const k=S.feet[0].kps;
    [[13,15],[14,16],[11,13],[12,14]].forEach(([a,b])=>{
      if(!k[a]||!k[b]||k[a].score<.2||k[b].score<.2) return;
      dctx.strokeStyle='rgba(79,255,176,.8)';
      dctx.lineWidth=3;
      dctx.beginPath(); dctx.moveTo(k[a].x,k[a].y); dctx.lineTo(k[b].x,k[b].y); dctx.stroke();
    });
  }
}

window.addEventListener('resize',()=>{ if(renderer) resize(); });
boot();
</script>
</body>
</html>
