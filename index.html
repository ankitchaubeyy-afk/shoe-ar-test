<!DOCTYPE html>

<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe AR</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>

    body{
      margin:0;
      background:#111;
      overflow:hidden;
      font-family:Arial,sans-serif;
    }

    model-viewer{
      width:100vw;
      height:100vh;
      background:#222;
    }

    .btn{
      position:absolute;
      bottom:25px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      color:black;
      padding:14px 24px;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
      text-decoration:none;
      z-index:99;
    }

  </style>

</head>

<body>

<model-viewer
src="shoe.glb"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1"> </model-viewer>

<a class="btn"
href="intent://arvr.google.com/scene-viewer/1.0?file=https://ankitchaubeyy-afk.github.io/shoe-ar-test/shoe.glb&mode=ar_preferred#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;S.browser_fallback_url=https://ankitchaubeyy-afk.github.io/shoe-ar-test/;end;">
👟 Open AR </a>

</body>
</html>
