<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      border: 1px solid #333;
      padding: 5px 12px;
      border-radius: 20px;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at 50% 60%, #1a1a2e 0%, #0a0a0a 70%);
      --poster-color: transparent;
    }

    .bottom-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 24px 28px 48px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .shoe-info h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
    }

    .shoe-info p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
      font-weight: 300;
    }

    #ar-button {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 16px 28px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(255,255,255,0.2);
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    #ar-button:active { transform: scale(0.96); }

    .hint {
      position: absolute;
      bottom: 145px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: pulse 2.5s ease-in-out infinite;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">SHOE AR</div>
    <div class="badge">3D · AR Ready</div>
  </header>

  <model-viewer
    src="shoe.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    ar-placement="floor"
    camera-controls
    auto-rotate
    auto-rotate-delay="500"
    rotation-per-second="20deg"
    shadow-intensity="1.2"
    shadow-softness="0.8"
    exposure="1.1"
    environment-image="neutral"
    alt="Shoe in AR">

    <button slot="ar-button" id="ar-button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
        <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
        <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      View in AR
    </button>

  </model-viewer>

  <div class="hint">Drag to rotate · Pinch to zoom</div>

  <div class="bottom-panel">
    <div class="shoe-info">
      <h2>Your Shoe</h2>
      <p>Tap AR to place in your space</p>
    </div>
  </div>

</body>
</html>
