<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR Shoe Test</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:#111;
    }

    model-viewer{
      width:100vw;
      height:100vh;
      background:#222;
    }

    #ar-button{
      background:white;
      color:black;
      border:none;
      border-radius:12px;
      position:absolute;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      padding:14px 22px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      z-index:10;
    }
  </style>
</head>

<body>

  <model-viewer
    src="shoe.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    ar-placement="floor"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    alt="3D Shoe">

    <button slot="ar-button" id="ar-button">
      👟 View in your space
    </button>

  </model-viewer>

</body>

</html>
