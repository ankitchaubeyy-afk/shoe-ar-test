<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Shoe Try-On - 3D Model</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Segoe UI,Arial,sans-serif}
  #container{position:fixed;inset:0;overflow:hidden;background:#000}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  #three,#debug{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
  #loader,#start-screen{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
  #loader.hidden,#start-screen.hidden{display:none}
  .title{color:#e8d5b0;font-size:20px;letter-spacing:4px;font-weight:800}.msg{color:#777;font-size:11px;letter-spacing:2px;text-transform:uppercase;line-height:1.8;max-width:330px}.barwrap{width:220px;height:3px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}.bar{height:100%;width:0;background:#e8d5b0;transition:.25s}
  button{background:#e8d5b0;color:#000;border:0;border-radius:12px;padding:13px 28px;font-weight:800;letter-spacing:.5px;cursor:pointer}.retry{display:none}
  #ui{position:fixed;left:0;right:0;bottom:0;z-index:100;padding:10px 14px 28px;background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.55),transparent);color:#e8d5b0}.status{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;color:#55ffb0}.row{display:flex;gap:8px;align-items:center;margin:6px 0;color:#777;font-size:10px;letter-spacing:1.5px;text-transform:uppercase}.row label{width:54px}.row input{flex:1;accent-color:#e8d5b0}.row span{width:44px;text-align:right;color:#e8d5b0;font-weight:700}.btns{display:flex;gap:8px;margin-top:8px}.mini{flex:1;background:rgba(255,255,255,.07);color:#aaa;border:1px solid rgba(255,255,255,.12);padding:9px;border-radius:10px;font-size:10px}.mini.on{border-color:#e8d5b0;color:#e8d5b0;background:rgba(232,213,176,.12)}
  #back,#badge{position:fixed;top:14px;z-index:120;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:7px 12px;color:#e8d5b0;text-decoration:none;font-size:11px;letter-spacing:2px}#back{left:12px}#badge{right:12px;color:#55ffb0}
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="three"></canvas>
  <canvas id="debug"></canvas>
</div>

<div id="loader">
  <div class="title">SHOE TRY-ON</div>
  <div class="barwrap"><div class="bar" id="bar"></div></div>
  <div class="msg" id="loadmsg">Starting...</div>
  <button class="retry" id="retry" onclick="location.reload()">↻ Retry</button>
</div>

<div id="start-screen" class="hidden">
  <div style="font-size:52px">👟</div>
  <div class="title">SHOE TRY-ON</div>
  <div class="msg">Point back camera at your feet<br>Keep 50-80 cm distance</div>
  <button id="start-btn">📷 Start Camera</button>
</div>

<a href="index.html" id="back">← AR</a>
<div id="badge">👟 0 feet</div>

<div id="ui">
  <div class="status" id="status">Loading...</div>
  <div class="row"><label>Scale</label><input id="scale" type="range" min="0.1" max="5" step="0.05" value="1"><span id="scalev">1.00</span></div>
  <div class="row"><label>Y Pos</label><input id="ypos" type="range" min="-180" max="180" step="1" value="0"><span id="yposv">0</span></div>
  <div class="row"><label>Rotate</label><input id="rot" type="range" min="-180" max="180" step="1" value="0"><span id="rotv">0</span></div>
  <div class="btns"><button class="mini" id="debugbtn">Skeleton</button><button class="mini" id="flipbtn">Flip</button><button class="mini" id="heightbtn">Low Shoe</button></div>
</div>

<script>
/* IMPORTANT: Put your .glb file in the SAME GitHub folder as this HTML.
   Recommended name: shoe.glb
   Or use: tryon.html?model=your-file-name.glb */
const MODEL_CANDIDATES = [
  new URLSearchParams(location.search).get('model'),
  'shoe.glb', 'shoe.gltf', 'model.glb', 'shoe_model.glb', 'shoes.glb', 'asset.glb'
].filter(Boolean);

const S={detector:null,feet:[],running:false,renderer:null,scene:null,camera:null,shoeLeft:null,shoeRight:null,modelLoaded:false,scale:1,y:0,rot:0,debug:false,flip:false,low:false};
const video=document.getElementById('video'), threeCanvas=document.getElementById('three'), debugCanvas=document.getElementById('debug'), dctx=debugCanvas.getContext('2d');
const loader=document.getElementById('loader'), startScr=document.getElementById('start-screen'), bar=document.getElementById('bar'), msg=document.getElementById('loadmsg'), retry=document.getElementById('retry');
const statusEl=document.getElementById('status'), badge=document.getElementById('badge');
function setLoad(t,p){msg.textContent=t;bar.style.width=p+'%'}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');const to=setTimeout(()=>rej(new Error('Timeout loading '+src)),20000);s.src=src;s.onload=()=>{clearTimeout(to);res()};s.onerror=()=>{clearTimeout(to);rej(new Error('Failed loading '+src))};document.head.appendChild(s)})}
function setRange(id,key,out,fmt=x=>x){const el=document.getElementById(id);el.oninput=e=>{S[key]=+e.target.value;document.getElementById(out).textContent=fmt(S[key])};}
setRange('scale','scale','scalev',v=>v.toFixed(2));setRange('ypos','y','yposv');setRange('rot','rot','rotv');
document.getElementById('debugbtn').onclick=e=>{S.debug=!S.debug;e.target.classList.toggle('on',S.debug)};
document.getElementById('flipbtn').onclick=e=>{S.flip=!S.flip;e.target.classList.toggle('on',S.flip)};
document.getElementById('heightbtn').onclick=e=>{S.low=!S.low;e.target.classList.toggle('on',S.low)};

async function init(){
 try{
  setLoad('Loading TensorFlow...',10); await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0/dist/tf-core.min.js');
  setLoad('Loading TFJS converter...',22); await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0/dist/tf-converter.min.js');
  setLoad('Loading WebGL backend...',34); await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0/dist/tf-backend-webgl.min.js');
  setLoad('Loading pose detection...',48); await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');
  setLoad('Loading Three.js...',58); await loadScript('https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js');
  setLoad('Loading GLTF loader...',66); await loadScript('https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/GLTFLoader.js');
  await tf.ready(); await tf.setBackend('webgl');
  setLoad('Creating foot tracker...',76);
  S.detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,enableSmoothing:true});
  setupThree();
  setLoad('Loading your shoe model...',86); await loadShoeModel();
  setLoad('Ready!',100); setTimeout(()=>{loader.classList.add('hidden');startScr.classList.remove('hidden')},350);
 }catch(e){console.error(e);setLoad('Load failed: '+e.message,100);retry.style.display='block';statusEl.textContent='Error'}
}

function setupThree(){
 S.renderer=new THREE.WebGLRenderer({canvas:threeCanvas,alpha:true,antialias:true});
 S.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
 S.renderer.setClearColor(0x000000,0);
 S.scene=new THREE.Scene();
 S.camera=new THREE.OrthographicCamera(0,1,1,0,-1000,1000);
 S.scene.add(new THREE.AmbientLight(0xffffff,1.9));
 const dir=new THREE.DirectionalLight(0xffffff,2.3);dir.position.set(0,2,5);S.scene.add(dir);
}
function cloneForSide(obj,side){const c=obj.clone(true);c.visible=false;c.userData.side=side;S.scene.add(c);return c}
async function loadShoeModel(){
 const loader3=new THREE.GLTFLoader(); let lastErr=null;
 for(const url of MODEL_CANDIDATES){
  try{
   const gltf=await new Promise((res,rej)=>loader3.load(url,res,undefined,rej));
   const root=gltf.scene;
   root.traverse(o=>{if(o.isMesh){o.frustumCulled=false;if(o.material){o.material.side=THREE.DoubleSide;o.material.needsUpdate=true}}});
   const box=new THREE.Box3().setFromObject(root); const size=new THREE.Vector3(); const center=new THREE.Vector3(); box.getSize(size); box.getCenter(center);
   root.position.sub(center); const maxAxis=Math.max(size.x,size.y,size.z)||1; root.scale.setScalar(170/maxAxis);
   S.shoeLeft=cloneForSide(root,'left'); S.shoeRight=cloneForSide(root,'right'); S.modelLoaded=true; statusEl.textContent='Model loaded: '+url; return;
  }catch(e){lastErr=e; console.warn('Model not found:',url,e)}
 }
 throw new Error('Shoe GLB not found. Rename your model to shoe.glb or open ?model=filename.glb');
}
function resize(){
 const w=video.videoWidth||innerWidth,h=video.videoHeight||innerHeight; if(!w||!h)return;
 threeCanvas.width=debugCanvas.width=w; threeCanvas.height=debugCanvas.height=h;
 S.renderer.setSize(w,h,false); S.camera.left=0;S.camera.right=w;S.camera.top=0;S.camera.bottom=h;S.camera.updateProjectionMatrix();
}

document.getElementById('start-btn').onclick=async()=>{
 startScr.classList.add('hidden');
 try{video.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});await video.play()}
 catch(e){try{video.srcObject=await navigator.mediaDevices.getUserMedia({video:true,audio:false});await video.play()}catch(err){alert('Camera error: '+err.message);return}}
 S.running=true; requestAnimationFrame(loop);
};
let last=0;
async function loop(ts){
 if(!S.running)return; requestAnimationFrame(loop); resize();
 dctx.clearRect(0,0,debugCanvas.width,debugCanvas.height);
 if(S.detector&&video.readyState>=2&&ts-last>70){last=ts;try{processPoses(await S.detector.estimatePoses(video))}catch(e){}}
 updateShoes(); S.renderer.render(S.scene,S.camera);
}
function kp(kps,i){return kps[i]&&kps[i].score>.22?kps[i]:null}
function processPoses(poses){
 S.feet=[]; for(const p of poses){const k=p.keypoints; const pairs=[{a:kp(k,15),kn:kp(k,13),side:'left'},{a:kp(k,16),kn:kp(k,14),side:'right'}];
  for(const f of pairs){if(!f.a)continue;let angle=Math.PI/2;if(f.kn)angle=Math.atan2(f.a.y-f.kn.y,f.a.x-f.kn.x); const depth=f.a.y/(debugCanvas.height||720); S.feet.push({x:f.a.x,y:f.a.y,angle,side:f.side,len:90+depth*120})}
  if(S.debug) drawSkeleton(k);
 }
 badge.textContent=`👟 ${S.feet.length} feet`; statusEl.textContent=S.modelLoaded?(S.feet.length?'Tracking ✓':'Show feet to camera'):'Model missing';
}
function updateShoes(){
 if(!S.shoeLeft||!S.shoeRight)return; S.shoeLeft.visible=false;S.shoeRight.visible=false;
 for(const f of S.feet){const obj=f.side==='left'?S.shoeLeft:S.shoeRight; obj.visible=true; obj.position.set(f.x,f.y+S.y,0); const sc=(f.len/170)*S.scale; obj.scale.setScalar(sc); if(f.side==='right')obj.scale.x*=-1; if(S.flip)obj.scale.x*=-1; const z=f.angle-Math.PI/2+(S.rot*Math.PI/180); obj.rotation.set(S.low?1.15:0.9,0,z);}
}
function drawSkeleton(k){[[13,15],[14,16],[11,13],[12,14]].forEach(([a,b])=>{const A=k[a],B=k[b];if(!A||!B||A.score<.2||B.score<.2)return;dctx.strokeStyle='rgba(79,255,176,.65)';dctx.lineWidth=3;dctx.beginPath();dctx.moveTo(A.x,A.y);dctx.lineTo(B.x,B.y);dctx.stroke()});[13,14,15,16].forEach(i=>{const A=k[i];if(!A||A.score<.2)return;dctx.fillStyle=i>14?'#ff6666':'#55ffb0';dctx.beginPath();dctx.arc(A.x,A.y,6,0,Math.PI*2);dctx.fill()})}
init();
</script>
</body>
</html>
