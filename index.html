<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050505;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 55%, #25253a 0%, #11111c 42%, #050505 100%);
      --poster-color: transparent;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 999;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
      pointer-events: none;
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 6px 13px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
    }

    .bottom-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999;
      padding: 24px 28px 44px;
      background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.25), transparent);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .shoe-info h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px;
      letter-spacing: 2px;
    }

    .shoe-info p {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    #my-ar-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      padding: 16px 28px;
      font-size: 15px;
      font-weight: 800;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 30px rgba(255,255,255,0.32);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    #my-ar-btn:active {
      transform: scale(0.96);
    }

    .hint {
      position: fixed;
      bottom: 145px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #777;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: pulse 2.5s ease-in-out infinite;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>

  <model-viewer
    id="viewer"
    src="shoe.glb"

    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    ar-placement="floor"

    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="12deg"

    shadow-intensity="2"
    shadow-softness="1"

    exposure="1.25"
    environment-image="https://modelviewer.dev/shared-assets/environments/commerce.hdr"

    camera-orbit="0deg 75deg 110%"
    min-camera-orbit="auto auto 70%"
    max-camera-orbit="auto auto 160%"
    field-of-view="28deg"

    interaction-prompt="none"
    alt="Shoe in AR">
  </model-viewer>

  <header>
    <div class="brand">SHOE AR</div>
    <div class="badge">Premium 3D · AR</div>
  </header>

  <div class="hint">Drag to rotate · Pinch to zoom</div>

  <div class="bottom-panel">
    <div class="shoe-info">
      <h2>Your Shoe</h2>
      <p>Premium AR product preview</p>
    </div>

    <button id="my-ar-btn">
      👟 View in AR
    </button>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const btn = document.getElementById('my-ar-btn');

    btn.addEventListener('click', () => {
      viewer.activateAR();
    });
  </script>

</body>
</html>
