<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shoe AR Test</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>

    body{
      margin:0;
      overflow:hidden;
      background:#111;
    }

    model-viewer{
      width:100vw;
      height:100vh;
      background:#222;
    }

    .ar-button{
      background:white;
      color:black;
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:16px;
      position:absolute;
      bottom:20px;
      right:20px;
      cursor:pointer;
      font-weight:bold;
    }

  </style>

</head>

<body>

  <model-viewer
    src="shoe.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    camera-orbit="0deg 75deg 105%"
    alt="3D Shoe">

    <button slot="ar-button" class="ar-button">
      👟 View in AR
    </button>

  </model-viewer>

</body>

</html>
