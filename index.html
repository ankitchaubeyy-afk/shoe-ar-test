<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoe AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --border: rgba(255,255,255,0.08);
      --accent: #e8d5b0;
      --muted: #555;
      --pill: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: #f0ede8;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* LOADER */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s, visibility 0.5s;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-bar-wrap {
      width: 160px; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .loader-bar {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .loader-text {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted);
    }

    /* VIEWER */
    model-viewer {
      width: 100%; flex: 1;
      --poster-color: transparent;
      background: radial-gradient(ellipse at 50% 40%, #1a1a28 0%, #0c0c0e 70%);
    }
    body.env-sunset model-viewer { background: radial-gradient(ellipse at 50% 30%, #2d1a0e 0%, #1a0a18 50%, #0c0c0e 100%); }
    body.env-arctic model-viewer { background: radial-gradient(ellipse at 50% 30%, #0d1f2d 0%, #071318 60%, #0c0c0e 100%); }
    body.env-forest model-viewer { background: radial-gradient(ellipse at 50% 30%, #0d1f0e 0%, #071008 60%, #0c0c0e 100%); }

    /* BOTTOM */
    .bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(to top, rgba(12,12,14,1) 55%, transparent);
      padding: 10px 20px 36px;
    }

    /* TABS */
    .tabs {
      display: flex; gap: 4px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 12px;
      color: var(--muted);
      cursor: pointer;
      border: none; border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: none;
      font-family: 'Syne', sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .panel { display: none; padding: 8px 0; }
    .panel.active { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* SWATCHES */
    .swatch {
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .swatch.active { border-color: var(--accent); transform: scale(1.15); }

    /* SIZES */
    .size-btn {
      width: 46px; height: 36px;
      border: 1px solid var(--border);
      background: var(--pill);
      color: #f0ede8;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .size-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .size-btn.sold-out { opacity: 0.25; text-decoration: line-through; cursor: not-allowed; }

    /* ENV BUTTONS */
    .env-btn {
      padding: 6px 14px; border-radius: 20px;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      border: 1px solid var(--border); background: var(--pill);
      color: var(--muted); cursor: pointer;
      font-family: 'Syne', sans-serif; transition: all 0.2s;
    }
    .env-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    /* AR BUTTON */
    #ar-btn {
      width: 100%; margin-top: 12px;
      background: var(--accent); color: #000;
      border: none; border-radius: 12px;
      padding: 15px;
      font-size: 14px; font-weight: 800;
      font-family: 'Syne', sans-serif;
      letter-spacing: 1px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    /* HINT */
    .hint {
      position: fixed; bottom: 195px;
      left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
      animation: pulse 2.5s ease-in-out infinite;
      pointer-events: none; white-space: nowrap; z-index: 99;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }

    /* TOAST */
    #toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--accent); color: #000;
      padding: 7px 18px; border-radius: 20px;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      z-index: 9999; opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="loader">
    <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
    <div class="loader-text">Loading…</div>
  </div>

  <div id="toast"></div>

  <model-viewer
    id="viewer"
    src="shoe.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    ar-placement="floor"
    camera-controls
    auto-rotate
    auto-rotate-delay="1000"
    rotation-per-second="15deg"
    shadow-intensity="1.5"
    shadow-softness="1"
    exposure="1.2"
    tone-mapping="commerce"
    environment-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
    alt="Shoe">
  </model-viewer>

  <div class="hint">Drag to rotate · Pinch to zoom</div>

  <div class="bottom">
    <div class="tabs">
      <button class="tab active" data-tab="colors">Colors</button>
      <button class="tab" data-tab="sizes">Sizes</button>
      <button class="tab" data-tab="scene">Scene</button>
    </div>

    <div class="panel active" id="tab-colors">
      <div class="swatch active" style="background:#d4b8a8" data-label="Rose" onclick="selectSwatch(this)"></div>
      <div class="swatch" style="background:#1a1a2e" data-label="Navy" onclick="selectSwatch(this)"></div>
      <div class="swatch" style="background:#2d4a1e" data-label="Forest" onclick="selectSwatch(this)"></div>
      <div class="swatch" style="background:#8b1a1a" data-label="Crimson" onclick="selectSwatch(this)"></div>
      <div class="swatch" style="background:#e8e8e0" data-label="White" onclick="selectSwatch(this)"></div>
    </div>

    <div class="panel" id="tab-sizes">
      <button class="size-btn sold-out">UK 5</button>
      <button class="size-btn" onclick="selectSize(this)">UK 6</button>
      <button class="size-btn" onclick="selectSize(this)">UK 7</button>
      <button class="size-btn active" onclick="selectSize(this)">UK 8</button>
      <button class="size-btn" onclick="selectSize(this)">UK 9</button>
      <button class="size-btn" onclick="selectSize(this)">UK 10</button>
      <button class="size-btn sold-out">UK 11</button>
    </div>

    <div class="panel" id="tab-scene">
      <button class="env-btn active" onclick="setEnv(this,'','neutral')">Studio</button>
      <button class="env-btn" onclick="setEnv(this,'env-sunset','legacy')">Sunset</button>
      <button class="env-btn" onclick="setEnv(this,'env-arctic','spruit')">Arctic</button>
      <button class="env-btn" onclick="setEnv(this,'env-forest','neutral')">Forest</button>
    </div>

    <button id="ar-btn" onclick="document.getElementById('viewer').activateAR()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Try in AR
    </button>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const loaderBar = document.getElementById('loader-bar');
    const loader = document.getElementById('loader');

    let prog = 0;
    const t = setInterval(() => {
      prog += Math.random() * 20;
      if (prog > 90) { prog = 90; clearInterval(t); }
      loaderBar.style.width = prog + '%';
    }, 200);

    viewer.addEventListener('load', () => {
      clearInterval(t);
      loaderBar.style.width = '100%';
      setTimeout(() => loader.classList.add('hidden'), 400);
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    function selectSwatch(el) {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      showToast(el.dataset.label);
    }

    function selectSize(el) {
      if (el.classList.contains('sold-out')) return;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      showToast(el.textContent);
    }

    const hdrs = {
      neutral: 'https://modelviewer.dev/shared-assets/environments/neutral.hdr',
      legacy: 'https://modelviewer.dev/shared-assets/environments/legacy.hdr',
      spruit: 'https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr'
    };

    function setEnv(el, cls, hdr) {
      document.querySelectorAll('.env-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.body.className = cls;
      viewer.environmentImage = hdrs[hdr];
      showToast(el.textContent);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1600);
    }
  </script>
</body>
</html>
