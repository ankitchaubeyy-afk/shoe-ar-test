<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Try-On</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100dvh; }
  #container { position:relative; width:100vw; height:100dvh; }
  #video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); z-index:1; }
  #sk-canvas { position:absolute; inset:0; width:100%; height:100%; transform:scaleX(-1); pointer-events:none; z-index:2; }
  #three-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:3; background:transparent !important; }

  #loader { position:fixed; inset:0; background:#000; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  #loader.hidden { display:none; }
  .ld-title { color:#e8d5b0; font-size:20px; letter-spacing:4px; font-weight:700; }
  .ld-bar-wrap { width:220px; height:3px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  .ld-bar { height:100%; background:#e8d5b0; width:0%; border-radius:3px; transition:width 0.3s; }
  .ld-msg { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#555; text-align:center; max-width:260px; }
  .ld-retry { background:#e8d5b0; color:#000; border:none; border-radius:10px; padding:10px 24px; font-size:13px; font-weight:700; cursor:pointer; display:none; margin-top:8px; }

  #ui { position:fixed; bottom:0; left:0; right:0; z-index:100; padding:10px 16px 34px; background:linear-gradient(to top, rgba(0,0,0,0.92) 60%, transparent); }
  #status { text-align:center; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#555; margin-bottom:8px; }
  #status.on { color:#4fffb0; } #status.off { color:#ff6b6b; }
  .sl-row { display:flex; align-items:center; gap:8px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#555; margin-bottom:5px; }
  .sl-row label { min-width:60px; }
  input[type=range] { flex:1; accent-color:#e8d5b0; height:3px; }
  .sl-val { min-width:34px; color:#e8d5b0; font-weight:700; text-align:right; font-size:11px; }
  .btns { display:flex; gap:8px; margin-top:8px; }
  .btn { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#888; border-radius:10px; padding:9px; font-size:11px; cursor:pointer; font-family:inherit; letter-spacing:1px; }
  .btn.on { background:rgba(232,213,176,0.12); border-color:#e8d5b0; color:#e8d5b0; }

  #back-btn { position:fixed; top:16px; left:16px; z-index:200; background:rgba(0,0,0,0.6); color:#e8d5b0; font-size:11px; letter-spacing:2px; text-transform:uppercase; padding:7px 13px; border-radius:20px; text-decoration:none; border:1px solid rgba(232,213,176,0.2); }
  #foot-badge { position:fixed; top:16px; right:16px; z-index:200; background:rgba(0,0,0,0.6); color:#4fffb0; font-size:11px; letter-spacing:2px; padding:7px 12px; border-radius:20px; }
</style>
</head>
<body>

<div id="loader">
  <div class="ld-title">SHOE TRY-ON</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
  <div class="ld-msg" id="ld-msg">Starting…</div>
  <button class="ld-retry" id="ld-retry" onclick="location.reload()">↺ Retry</button>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="sk-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
</div>

<a href="index.html" id="back-btn">← AR</a>
<div id="foot-badge">👟 0 feet</div>

<div id="ui">
  <div id="status">Waiting…</div>
  <div class="sl-row"><label>Scale</label>
    <input type="range" id="sl-scale" min="0.3" max="4" step="0.05" value="1.4">
    <span class="sl-val" id="v-scale">1.4</span></div>
  <div class="sl-row"><label>Forward</label>
    <input type="range" id="sl-fwd" min="-150" max="150" step="1" value="40">
    <span class="sl-val" id="v-fwd">40</span></div>
  <div class="sl-row"><label>Up/Down</label>
    <input type="range" id="sl-y" min="-100" max="100" step="1" value="0">
    <span class="sl-val" id="v-y">0</span></div>
  <div class="sl-row"><label>Rotate</label>
    <input type="range" id="sl-rot" min="-90" max="90" step="1" value="0">
    <span class="sl-val" id="v-rot">0°</span></div>
  <div class="btns">
    <button class="btn" id="btn-sk">🦴 Skeleton</button>
    <button class="btn" id="btn-flip">🔄 Flip</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const S = {
  detector:null, running:false,
  skeleton:false, flip:false,
  scale:1.4, fwd:40, yOff:0, rotOff:0,
  feet:[],
  shoeReady:false,
  // smoothed positions
  smoothL:null, smoothR:null,
};

const video     = document.getElementById('video');
const skCanvas  = document.getElementById('sk-canvas');
const skCtx     = skCanvas.getContext('2d');
const ldBar     = document.getElementById('ld-bar');
const ldMsg     = document.getElementById('ld-msg');
const loader    = document.getElementById('loader');
const statusEl  = document.getElementById('status');
const footBadge = document.getElementById('foot-badge');
const retryBtn  = document.getElementById('ld-retry');

// Sliders
const sliders = {
  'sl-scale': v => { S.scale = +v; document.getElementById('v-scale').textContent = (+v).toFixed(1); },
  'sl-fwd':   v => { S.fwd   = +v; document.getElementById('v-fwd').textContent   = v; },
  'sl-y':     v => { S.yOff  = +v; document.getElementById('v-y').textContent     = v; },
  'sl-rot':   v => { S.rotOff= +v*Math.PI/180; document.getElementById('v-rot').textContent = v+'°'; },
};
Object.keys(sliders).forEach(id => {
  const el = document.getElementById(id);
  el.oninput = e => sliders[id](e.target.value);
  sliders[id](el.value);
});

function tog(key,id){ S[key]=!S[key]; document.getElementById(id).classList.toggle('on',S[key]); }
document.getElementById('btn-sk').onclick   = () => tog('skeleton','btn-sk');
document.getElementById('btn-flip').onclick = () => tog('flip','btn-flip');

// ── THREE.JS ───────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('three-canvas'),
  alpha: true, antialias: true, premultipliedAlpha: false
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.shadowMap.enabled = true;

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(0,1,1,0,0.1,2000);
camera.position.z = 500;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const dir = new THREE.DirectionalLight(0xffffff, 2);
dir.position.set(0.5, 1, 1);
scene.add(dir);
const fill = new THREE.DirectionalLight(0xfff0e0, 0.8);
fill.position.set(-1, 0.5, 0.5);
scene.add(fill);

function resizeRenderer() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.right  = w;
  camera.bottom = h;
  camera.updateProjectionMatrix();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

// Shoe groups — each holds normalized shoe model
const groupL = new THREE.Group(); scene.add(groupL); groupL.visible = false;
const groupR = new THREE.Group(); scene.add(groupR); groupR.visible = false;

let shoeNormLength = 100; // shoe length in normalized units

function setupGroup(gltf, group, mirrorX) {
  while(group.children.length) group.remove(group.children[0]);
  const model = gltf.scene.clone(true);
  const box   = new THREE.Box3().setFromObject(model);
  const size  = box.getSize(new THREE.Vector3());
  const center= box.getCenter(new THREE.Vector3());

  // Store shoe dimensions for scaling
  shoeNormLength = size.x;

  // Center the model at origin, shoe pointing along +X axis
  model.position.sub(center);

  // Rotate so shoe toe points in +X direction (adjust if needed)
  // Most shoes exported from Blender face +Y or +Z
  model.rotation.y = Math.PI / 2; // try rotating if shoe faces wrong way

  if (mirrorX) model.scale.x *= -1;
  model.traverse(n => { if(n.isMesh){ n.castShadow=true; n.receiveShadow=false; } });
  group.add(model);
}

function loadShoeGLB() {
  return new Promise((resolve, reject) => {
    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load('shoe.glb',
      gltf => {
        setupGroup(gltf, groupL, false);
        setupGroup(gltf, groupR, true);
        S.shoeReady = true;
        resolve();
      },
      xhr => { ldBar.style.width = (75 + Math.round(xhr.loaded/(xhr.total||1)*20)) + '%'; },
      err => reject(err)
    );
  });
}

// ── LOAD SCRIPTS ──────────────────────────────────────────
function loadScript(src, timeout=30000) {
  return new Promise((res,rej) => {
    const t = setTimeout(()=>rej(new Error('Timeout: '+src.split('/').pop())), timeout);
    const s = document.createElement('script');
    s.src=src;
    s.onload=()=>{ clearTimeout(t); res(); };
    s.onerror=()=>{ clearTimeout(t); rej(new Error('Failed: '+src.split('/').pop())); };
    document.head.appendChild(s);
  });
}

async function loadModel() {
  const retryT = setTimeout(()=>{ retryBtn.style.display='block'; }, 35000);
  try {
    ldMsg.textContent='AI engine (1/2)…'; ldBar.style.width='15%';
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js');

    ldMsg.textContent='Pose model (2/2)…'; ldBar.style.width='45%';
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');

    ldMsg.textContent='WebGL init…'; ldBar.style.width='58%';
    await tf.setBackend('webgl');
    await tf.ready();

    ldMsg.textContent='MoveNet detector…'; ldBar.style.width='70%';
    S.detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING, enableSmoothing: true }
    );

    ldMsg.textContent='Loading shoe…'; ldBar.style.width='75%';
    await loadShoeGLB();

    clearTimeout(retryT);
    ldBar.style.width='100%'; ldMsg.textContent='Ready!';
    setTimeout(()=>{ loader.classList.add('hidden'); startCamera(); }, 300);
  } catch(err) {
    clearTimeout(retryT);
    ldMsg.textContent='❌ '+err.message;
    retryBtn.style.display='block';
    console.error(err);
  }
}

// ── CAMERA ────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    video.srcObject=stream; await video.play();
  } catch {
    try {
      const s2 = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
      video.srcObject=s2; await video.play();
    } catch(e){ alert('Camera error: '+e.message); return; }
  }
  S.running=true;
  requestAnimationFrame(loop);
}

// ── SMOOTH helper ─────────────────────────────────────────
// Exponential smoothing so shoe doesn't jitter
function smooth(prev, next, alpha=0.4) {
  if (!prev) return { ...next };
  return {
    sx:      prev.sx      + alpha*(next.sx-prev.sx),
    sy:      prev.sy      + alpha*(next.sy-prev.sy),
    angle:   prev.angle   + alpha*(next.angle-prev.angle),
    footPx:  prev.footPx  + alpha*(next.footPx-prev.footPx),
    side:    next.side,
  };
}

// ── MAIN LOOP ──────────────────────────────────────────────
let lastD=0;
async function loop(ts) {
  if(!S.running) return;
  requestAnimationFrame(loop);

  // Sync sk canvas resolution
  const vw = video.videoWidth  || window.innerWidth;
  const vh = video.videoHeight || window.innerHeight;
  if(skCanvas.width !== vw){ skCanvas.width=vw; skCanvas.height=vh; }
  skCtx.clearRect(0,0,vw,vh);

  if(S.detector && video.readyState>=2 && ts-lastD>55) {
    lastD=ts;
    try {
      const poses = await S.detector.estimatePoses(video);
      processPoses(poses, vw, vh);
    } catch(e){ console.warn(e); }
  }

  updateShoes();
  renderer.render(scene, camera);
}

// ── POSE PROCESSING ───────────────────────────────────────
// MoveNet keypoints:
// 11=left_hip  12=right_hip
// 13=left_knee 14=right_knee
// 15=left_ankle 16=right_ankle
function processPoses(poses, vw, vh) {
  const raw = { left:null, right:null };

  poses.forEach(pose => {
    const kp  = pose.keypoints;
    const get = (i,minScore=0.15) => (kp[i]?.score>minScore) ? kp[i] : null;

    [
      { ankle:get(15), knee:get(13), hip:get(11), side:'left'  },
      { ankle:get(16), knee:get(14), hip:get(12), side:'right' },
    ].forEach(({ankle, knee, hip, side}) => {
      if(!ankle) return;

      const sw = window.innerWidth, sh = window.innerHeight;

      // Map video-space → screen-space
      // video has CSS transform:scaleX(-1), so we DON'T flip here —
      // Three.js shoe will be placed in screen coords without mirroring
      const sx = (ankle.x/vw) * sw;
      const sy = (ankle.y/vh) * sh;

      // Foot length estimate: use knee–ankle distance if available,
      // otherwise estimate from vertical position (lower = closer)
      let footPx;
      if (knee) {
        const ksx = (knee.x/vw)*sw, ksy = (knee.y/vh)*sh;
        const legPx = Math.hypot(sx-ksx, sy-ksy);
        footPx = legPx * 0.55; // foot ≈ 55% of lower leg
      } else {
        footPx = 60 + (ankle.y/vh) * 100;
      }

      // Foot angle: direction from knee → ankle = direction leg points
      // Foot is roughly in the same direction
      let angle = Math.PI/2; // default: pointing down
      if (knee) {
        const ksx=(knee.x/vw)*sw, ksy=(knee.y/vh)*sh;
        angle = Math.atan2(sy - ksy, sx - ksx);
      }

      raw[side] = { sx, sy, angle, footPx, side };
    });
  });

  // Apply smoothing
  if(raw.left)  S.smoothL = smooth(S.smoothL,  raw.left,  0.35);
  if(raw.right) S.smoothR = smooth(S.smoothR, raw.right, 0.35);
  if(!raw.left  && S.smoothL) S.smoothL = smooth(S.smoothL, S.smoothL, 0.1); // decay
  if(!raw.right && S.smoothR) S.smoothR = smooth(S.smoothR, S.smoothR, 0.1);

  S.feet = [];
  if(S.smoothL) S.feet.push(S.smoothL);
  if(S.smoothR) S.feet.push(S.smoothR);

  footBadge.textContent = `👟 ${Object.values(raw).filter(Boolean).length} feet`;
  const detected = raw.left || raw.right;
  statusEl.textContent = detected ? 'Tracking ✓' : 'Show feet to camera';
  statusEl.className   = detected ? 'on' : 'off';

  // Skeleton
  if(S.skeleton && poses[0]) drawSkeleton(poses[0].keypoints, vw, vh);
}

// ── UPDATE SHOES ──────────────────────────────────────────
function updateShoes() {
  if(!S.shoeReady) return;
  const sw = window.innerWidth, sh = window.innerHeight;

  [
    { group:groupL, data:S.smoothL, mirX:false },
    { group:groupR, data:S.smoothR, mirX:true  },
  ].forEach(({group, data, mirX}) => {
    if(!data){ group.visible=false; return; }
    group.visible = true;

    // Foot direction vector (unit)
    const dir_x = Math.cos(data.angle);
    const dir_y = Math.sin(data.angle);

    // Place shoe so its CENTER is `fwd` pixels ahead of ankle
    // "ahead" = in direction of foot (knee→ankle direction)
    const cx = data.sx + dir_x * S.fwd;
    const cy = data.sy + dir_y * S.fwd + S.yOff;

    // Three ortho camera: origin=top-left, x right, y down
    group.position.set(cx, cy, 0);

    // Scale: make shoe length = footPx pixels
    const sc = (data.footPx / shoeNormLength) * S.scale;
    group.scale.set(sc * (mirX?-1:1), sc, sc);

    // Rotation: shoe toe points in foot direction
    // Three.js rotateZ: angle measured from +X axis CCW
    let rot = data.angle + S.rotOff;
    if(S.flip) rot += Math.PI;
    group.rotation.z = -rot; // negate because screen Y is flipped vs math Y
  });
}

// ── SKELETON ──────────────────────────────────────────────
function drawSkeleton(kps, vw, vh) {
  const sw=window.innerWidth, sh=window.innerHeight;
  const toS = kp => ({ x:(kp.x/vw)*sw, y:(kp.y/vh)*sh });

  [[11,13],[13,15],[12,14],[14,16]].forEach(([a,b]) => {
    const ka=kps[a], kb=kps[b];
    if(!ka||!kb||ka.score<0.15||kb.score<0.15) return;
    const pa=toS(ka), pb=toS(kb);
    // sk-canvas is CSS-mirrored so we draw in video coords
    skCtx.strokeStyle='rgba(79,255,176,0.7)';
    skCtx.lineWidth=3;
    skCtx.beginPath();
    skCtx.moveTo(ka.x*(vw/vw), ka.y);
    skCtx.lineTo(kb.x, kb.y);
    skCtx.stroke();
  });

  [11,12,13,14,15,16].forEach(i => {
    const k=kps[i]; if(!k||k.score<0.15) return;
    skCtx.beginPath(); skCtx.arc(k.x,k.y,i>=15?8:5,0,Math.PI*2);
    skCtx.fillStyle = i>=15 ? '#ff6b6b' : i>=13 ? '#ffd700' : '#4fffb0';
    skCtx.fill();
    skCtx.fillStyle='#fff'; skCtx.font='10px monospace';
    skCtx.fillText(i>=15?'ANKLE':i>=13?'KNEE':'HIP', k.x+8, k.y);
  });
}

loadModel();
</script>
</body>
</html>
