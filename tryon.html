<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Try-On</title>
<!-- TensorFlow.js + MoveNet — only ~3MB total -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#000;
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
    height:100dvh;
  }

  #container {
    position:relative;
    width:100vw;
    height:100dvh;
  }

  #video {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform:scaleX(-1);
  }

  #overlay {
    position:absolute; inset:0;
    width:100%; height:100%;
    transform:scaleX(-1);
    pointer-events:none;
  }

  /* LOADER */
  #loader {
    position:fixed; inset:0;
    background:#000; z-index:999;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px;
  }
  #loader.hidden { display:none; }

  .ld-title {
    color:#e8d5b0; font-size:20px;
    letter-spacing:4px; font-weight:700;
    text-transform:uppercase;
  }
  .ld-bar-wrap {
    width:200px; height:3px;
    background:rgba(255,255,255,0.1);
    border-radius:3px; overflow:hidden;
  }
  .ld-bar {
    height:100%; background:#e8d5b0;
    width:0%; border-radius:3px;
    transition:width 0.4s ease;
  }
  .ld-msg {
    font-size:11px; letter-spacing:2px;
    text-transform:uppercase; color:#555;
    text-align:center; line-height:1.8;
  }

  /* START SCREEN */
  #start-screen {
    position:fixed; inset:0;
    background:#000; z-index:998;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px;
  }
  #start-screen.hidden { display:none; }

  .start-icon { font-size:56px; }
  .start-title {
    color:#e8d5b0; font-size:22px;
    letter-spacing:3px; font-weight:700;
  }
  .start-sub {
    color:#555; font-size:12px;
    letter-spacing:2px; text-align:center;
    line-height:1.8;
  }
  #start-btn {
    background:#e8d5b0; color:#000;
    border:none; border-radius:14px;
    padding:16px 40px; font-size:15px;
    font-weight:700; letter-spacing:1px;
    cursor:pointer; margin-top:8px;
  }

  /* UI BOTTOM */
  #ui {
    position:fixed; bottom:0; left:0; right:0;
    z-index:100;
    padding:12px 16px 36px;
    background:linear-gradient(to top, rgba(0,0,0,0.9) 60%, transparent);
  }

  #status {
    text-align:center; font-size:11px;
    letter-spacing:2px; text-transform:uppercase;
    color:#666; margin-bottom:10px;
  }
  #status.on  { color:#4fffb0; }
  #status.off { color:#ff6b6b; }

  .sliders { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
  .sl-row {
    display:flex; align-items:center; gap:8px;
    font-size:11px; letter-spacing:1px;
    text-transform:uppercase; color:#666;
  }
  .sl-row label { min-width:55px; }
  input[type=range] { flex:1; accent-color:#e8d5b0; height:3px; }
  .sl-val { min-width:28px; color:#e8d5b0; font-weight:700; font-size:11px; text-align:right; }

  .btns { display:flex; gap:8px; margin-bottom:10px; }
  .btn {
    flex:1; background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    color:#fff; border-radius:10px;
    padding:9px; font-size:12px;
    cursor:pointer; font-family:inherit;
    letter-spacing:1px;
  }
  .btn.active { background:rgba(232,213,176,0.15); border-color:#e8d5b0; color:#e8d5b0; }

  #back-btn {
    position:fixed; top:16px; left:16px; z-index:200;
    background:rgba(0,0,0,0.6);
    color:#e8d5b0; font-size:11px;
    letter-spacing:2px; text-transform:uppercase;
    padding:8px 14px; border-radius:20px;
    text-decoration:none;
    border:1px solid rgba(232,213,176,0.25);
  }

  #foot-badge {
    position:fixed; top:16px; right:16px; z-index:200;
    background:rgba(0,0,0,0.6);
    color:#4fffb0; font-size:11px;
    letter-spacing:2px; padding:7px 12px;
    border-radius:20px;
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-title">SHOE TRY-ON</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
  <div class="ld-msg" id="ld-msg">Loading model…</div>
</div>

<!-- START SCREEN -->
<div id="start-screen" class="hidden">
  <div class="start-icon">👟</div>
  <div class="start-title">SHOE TRY-ON</div>
  <div class="start-sub">Point camera at your feet<br>Keep feet 50–80cm from camera</div>
  <button id="start-btn">📷 Start Camera</button>
</div>

<!-- MAIN -->
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<a href="index.html" id="back-btn">← AR Viewer</a>
<div id="foot-badge">👟 0 feet</div>

<div id="ui">
  <div id="status">Waiting for feet…</div>

  <div class="sliders">
    <div class="sl-row">
      <label>Scale</label>
      <input type="range" id="sl-scale" min="0.3" max="2.5" step="0.05" value="1.0">
      <span class="sl-val" id="v-scale">1.0</span>
    </div>
    <div class="sl-row">
      <label>Y Pos</label>
      <input type="range" id="sl-y" min="-60" max="60" step="1" value="0">
      <span class="sl-val" id="v-y">0</span>
    </div>
  </div>

  <div class="btns">
    <button class="btn" id="btn-skeleton">🦴 Skeleton</button>
    <button class="btn" id="btn-flip">🔄 Flip</button>
    <button class="btn" id="btn-mirror">📷 Mirror</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
const S = {
  detector:   null,
  shoeImg:    null,
  running:    false,
  skeleton:   false,
  flipShoe:   false,
  mirror:     false,
  scale:      1.0,
  yOff:       0,
  feet:       [],
};

// ── Elements ───────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('overlay');
const ctx       = canvas.getContext('2d');
const loader    = document.getElementById('loader');
const ldBar     = document.getElementById('ld-bar');
const ldMsg     = document.getElementById('ld-msg');
const startScr  = document.getElementById('start-screen');
const statusEl  = document.getElementById('status');
const footBadge = document.getElementById('foot-badge');

// ── Sliders ────────────────────────────────────────────────
document.getElementById('sl-scale').oninput = e => {
  S.scale = parseFloat(e.target.value);
  document.getElementById('v-scale').textContent = S.scale.toFixed(2);
};
document.getElementById('sl-y').oninput = e => {
  S.yOff = parseInt(e.target.value);
  document.getElementById('v-y').textContent = S.yOff;
};

// ── Toggle buttons ─────────────────────────────────────────
function toggleBtn(id, key) {
  S[key] = !S[key];
  document.getElementById(id).classList.toggle('active', S[key]);
}
document.getElementById('btn-skeleton').onclick = () => toggleBtn('btn-skeleton','skeleton');
document.getElementById('btn-flip').onclick     = () => toggleBtn('btn-flip','flipShoe');
document.getElementById('btn-mirror').onclick   = () => toggleBtn('btn-mirror','mirror');

// ── MoveNet keypoint indices ───────────────────────────────
// 15=left_ankle 16=right_ankle 17=left_heel 18=right_heel
// 19=left_foot_index 20=right_foot_index  (MoveNet Thunder/Lightning 17kp)
// MoveNet has 17 keypoints — feet are at 15,16
// For heel & toe we use:  ankle=15/16, knee=13/14 to infer direction
const KP = {
  leftKnee:  13, rightKnee:  14,
  leftAnkle: 15, rightAnkle: 16,
};

// ── Load TF + MoveNet ──────────────────────────────────────
async function loadModel() {
  ldMsg.textContent  = 'Loading TensorFlow…';
  ldBar.style.width  = '20%';

  await tf.ready();
  ldBar.style.width  = '50%';
  ldMsg.textContent  = 'Loading MoveNet…';

  S.detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {
      modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
      enableSmoothing: true,
    }
  );

  ldBar.style.width  = '80%';
  ldMsg.textContent  = 'Loading shoe…';

  // Load shoe image for 2D overlay (fast fallback)
  // Also prepare GLB rendering via offscreen canvas if available
  await loadShoeGraphic();

  ldBar.style.width  = '100%';
  ldMsg.textContent  = 'Ready!';

  setTimeout(() => {
    loader.classList.add('hidden');
    startScr.classList.remove('hidden');
  }, 400);
}

// ── Shoe graphic — draw shoe as canvas image ───────────────
async function loadShoeGraphic() {
  return new Promise(resolve => {
    // Try loading shoe.glb thumbnail — use a canvas-drawn shoe shape as fallback
    S.shoeImg = null;

    // Draw a shoe silhouette on an offscreen canvas
    const oc  = document.createElement('canvas');
    oc.width  = 200;
    oc.height = 80;
    const ox  = oc.getContext('2d');

    // Shoe body
    ox.fillStyle = '#d4b8a8';
    ox.beginPath();
    ox.ellipse(100, 45, 90, 28, 0, 0, Math.PI*2);
    ox.fill();

    // Toe cap
    ox.fillStyle = '#c4a898';
    ox.beginPath();
    ox.ellipse(175, 48, 28, 20, 0.2, 0, Math.PI*2);
    ox.fill();

    // Upper
    ox.fillStyle = '#e8d5b0';
    ox.beginPath();
    ox.moveTo(60, 42);
    ox.bezierCurveTo(80, 10, 140, 8, 165, 30);
    ox.lineTo(155, 40);
    ox.bezierCurveTo(130, 22, 85, 22, 65, 42);
    ox.closePath();
    ox.fill();

    // Sole
    ox.fillStyle = '#f0ede8';
    ox.beginPath();
    ox.ellipse(100, 58, 88, 14, 0, 0, Math.PI*2);
    ox.fill();

    S.shoeImg = oc;
    resolve();
  });
}

// ── Camera ─────────────────────────────────────────────────
document.getElementById('start-btn').onclick = async () => {
  startScr.classList.add('hidden');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
      },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
  } catch {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
      await video.play();
    } catch(e) {
      alert('Camera denied: ' + e.message);
      return;
    }
  }

  S.running = true;
  requestAnimationFrame(loop);
};

// ── Detection loop ─────────────────────────────────────────
let lastDetect = 0;

async function loop(ts) {
  if (!S.running) return;
  requestAnimationFrame(loop);

  // Sync canvas size
  if (canvas.width !== video.videoWidth && video.videoWidth > 0) {
    canvas.width  = video.videoWidth  || window.innerWidth;
    canvas.height = video.videoHeight || window.innerHeight;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Run detection at ~20fps to save battery
  if (S.detector && video.readyState >= 2 && ts - lastDetect > 50) {
    lastDetect = ts;
    try {
      const poses = await S.detector.estimatePoses(video);
      processPoses(poses);
    } catch(e) { /* skip frame */ }
  }

  drawShoes();
}

// ── Process poses → extract feet ───────────────────────────
function processPoses(poses) {
  S.feet = [];

  poses.forEach(pose => {
    const kps = pose.keypoints;
    const get = i => kps[i] && kps[i].score > 0.25 ? kps[i] : null;

    const sides = [
      { ankle: get(KP.leftAnkle),  knee: get(KP.leftKnee),  side: 'left'  },
      { ankle: get(KP.rightAnkle), knee: get(KP.rightKnee), side: 'right' },
    ];

    sides.forEach(({ ankle, knee, side }) => {
      if (!ankle) return;

      const W = canvas.width, H = canvas.height;

      // ankle position
      const ax = ankle.x, ay = ankle.y;

      // Infer foot direction from knee→ankle vector
      let angle = Math.PI / 2; // default pointing down
      if (knee) {
        // knee→ankle direction = leg direction
        const dx = ax - knee.x;
        const dy = ay - knee.y;
        angle = Math.atan2(dy, dx);
      }

      // Foot length estimate from ankle height (lower = closer = bigger)
      const depthFactor = ay / H; // 0=top 1=bottom
      const footLen = 80 + depthFactor * 80; // 80–160px range

      S.feet.push({ ax, ay, angle, footLen, side });
    });
  });

  // Update UI
  footBadge.textContent = `👟 ${S.feet.length} ${S.feet.length === 1 ? 'foot' : 'feet'}`;

  if (S.feet.length > 0) {
    statusEl.textContent = 'Tracking ✓';
    statusEl.className   = 'on';
  } else {
    statusEl.textContent = 'Point camera at feet';
    statusEl.className   = 'off';
  }

  // Skeleton
  if (S.skeleton && poses.length > 0) {
    drawSkeleton(poses[0].keypoints);
  }
}

// ── Draw shoes on canvas ───────────────────────────────────
function drawShoes() {
  if (!S.shoeImg || S.feet.length === 0) return;

  S.feet.forEach(foot => {
    const { ax, ay, angle, footLen, side } = foot;

    const W = S.shoeImg.width;
    const H = S.shoeImg.height;
    const scale = (footLen / W) * S.scale;

    ctx.save();

    // Move to ankle position + Y offset
    ctx.translate(ax, ay + S.yOff);

    // Rotate with foot angle
    let rot = angle - Math.PI / 2;
    if (S.flipShoe) rot += Math.PI;

    ctx.rotate(rot);

    // Mirror for right foot
    const isRight = side === 'right';
    if (isRight) ctx.scale(-1, 1);
    // Agar user ne mirror toggle kiya
    if (S.mirror) ctx.scale(-1, 1);

    // Scale
    ctx.scale(scale, scale);

    // Draw centered on ankle
    ctx.globalAlpha = 0.92;
    ctx.drawImage(S.shoeImg, -W / 2, -H / 2);
    ctx.globalAlpha = 1;

    ctx.restore();
  });
}

// ── Skeleton debug ─────────────────────────────────────────
const CONNECTIONS = [
  [11,13],[13,15],[12,14],[14,16], // arms (ignore)
  [11,12],[11,23],[12,24],[23,24], // torso
  [23,25],[25,27],[27,29],[29,31], // left leg
  [24,26],[26,28],[28,30],[30,32], // right leg
];

function drawSkeleton(kps) {
  ctx.strokeStyle = 'rgba(79,255,176,0.6)';
  ctx.lineWidth   = 2;

  kps.forEach(kp => {
    if (kp.score < 0.25) return;
    ctx.beginPath();
    ctx.arc(kp.x, kp.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = kp.name?.includes('ankle') || kp.name?.includes('knee')
      ? '#ff6b6b' : 'rgba(79,255,176,0.7)';
    ctx.fill();
  });
}

// ── Boot ───────────────────────────────────────────────────
loadModel();
</script>
</body>
</html>
